---
layout: compress
---
<!DOCTYPE html>
<html lang="{{ site.lang | default: 'es' }}">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.description }}">
    <meta name="author" content="{{ site.name }}">
    <meta name="theme-color" content="#0f172a">

    {% seo %}

    {% include favicon.html %}

    <link rel="canonical" href="{{ site.url }}{{ page.url | replace:'index.html','' }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
    {% capture scss_sheet %}{% include style.scss %}{% endcapture %}
    {{ scss_sheet | scssify }}
    </style>
</head>
<body>

    {% include nav.html %}

    <div class="wrapper-{% if site.width == 'normal' %}normal{% else %}large{% endif %}">
        {% if page.tag %}
            <div class="post">
        {% else %}
            {% if showHeader != true %}
                <div class="page {{ page.title | downcase | replace: ' ', '-' }}">
            {% else %}
                <div class="{{ page.title | downcase | replace: ' ', '-' }}">
            {% endif %}
        {% endif %}

            {{ content }}

        </div>
    </div>

    {% include icons.html %}

    <script>
    (function () {
        var nav = document.querySelector('.site-nav');
        if (!nav) return;
        function onScroll() {
            nav.classList.toggle('scrolled', window.scrollY > 40);
        }
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
    })();
    </script>

    {% include analytics-google.html %}

</body>
</html>
